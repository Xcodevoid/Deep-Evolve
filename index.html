<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep-Evolver</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0a0a0f;
        }
        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            white-space: nowrap;
        }
        .chat-box {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(99,102,241,0.3);
        }
        .messages {
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 20px;
        }
        .message {
            margin: 10px 0;
            padding: 12px;
            border-radius: 12px;
            max-width: 80%;
        }
        .user {
            background: var(--primary);
            margin-left: auto;
        }
        .assistant {
            background: #1a1a2e;
            border: 1px solid var(--secondary);
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            background: #1a1a2e;
            border: 1px solid var(--primary);
            border-radius: 8px;
            color: white;
        }
        button {
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            opacity: 0.9;
        }
        .settings {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
        }
        .hidden {
            display: none;
        }
        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
        }
        .success { background: #10b981; }
        .error { background: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Deep-Evolver</h1>
        
        <div class="chat-box">
            <div class="messages" id="messages">
                <div class="message assistant">Hello! I'm Deep-Evolver. Please add your OpenRouter API key in settings to start chatting.</div>
            </div>
            
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type your message..." disabled>
                <button id="sendButton" disabled>Send</button>
                <button onclick="toggleSettings()">⚙️</button>
            </div>
        </div>

        <div id="settingsPanel" class="settings hidden">
            <h3>OpenRouter API Settings</h3>
            <p>Get your free key at <a href="https://openrouter.ai/keys" target="_blank" style="color: var(--primary);">openrouter.ai/keys</a></p>
            <input type="password" id="apiKeyInput" placeholder="Enter your OpenRouter API key" style="width: 100%; margin: 10px 0;">
            <button onclick="saveApiKey()">Save Key</button>
            <button onclick="clearApiKey()">Clear Key</button>
            <button onclick="testApiKey()">Test Connection</button>
            <div id="statusMessage"></div>
        </div>
    </div>

    <script>
        // Clean function to remove any non-ASCII characters
        function cleanString(str) {
            if (!str) return '';
            return str.replace(/[^\x00-\x7F]/g, '').trim();
        }

        // Load saved key
        let apiKey = localStorage.getItem('openrouter_key');
        if (apiKey) {
            apiKey = cleanString(apiKey);
            enableChat();
        }

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) {
                document.getElementById('apiKeyInput').value = apiKey || '';
            }
        }

        function saveApiKey() {
            const input = document.getElementById('apiKeyInput');
            const newKey = cleanString(input.value);
            
            if (!newKey) {
                showStatus('Please enter an API key', 'error');
                return;
            }
            
            if (!newKey.startsWith('sk-or-')) {
                showStatus('Invalid key format. Should start with "sk-or-"', 'error');
                return;
            }
            
            apiKey = newKey;
            localStorage.setItem('openrouter_key', newKey);
            enableChat();
            showStatus('API key saved!', 'success');
            setTimeout(() => toggleSettings(), 1500);
        }

        function clearApiKey() {
            apiKey = '';
            localStorage.removeItem('openrouter_key');
            document.getElementById('apiKeyInput').value = '';
            disableChat();
            showStatus('API key cleared', 'success');
        }

        async function testApiKey() {
            const testKey = cleanString(document.getElementById('apiKeyInput').value || apiKey);
            if (!testKey) {
                showStatus('No API key to test', 'error');
                return;
            }
            
            showStatus('Testing connection...', '');
            
            try {
                const response = await fetch('https://openrouter.ai/api/v1/auth/key', {
                    headers: {
                        'Authorization': `Bearer ${testKey}`
                    }
                });
                
                if (response.ok) {
                    showStatus('✅ API key is valid!', 'success');
                } else {
                    showStatus(`❌ Invalid API key (${response.status})`, 'error');
                }
            } catch (error) {
                showStatus(`❌ Connection error: ${error.message}`, 'error');
            }
        }

        function enableChat() {
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendButton').disabled = false;
            addMessage('assistant', '✅ API key configured! You can now start chatting.');
        }

        function disableChat() {
            document.getElementById('messageInput').disabled = true;
            document.getElementById('sendButton').disabled = true;
        }

        function showStatus(message, type) {
            const status = document.getElementById('statusMessage');
            status.textContent = message;
            status.className = 'status ' + (type || '');
        }

        function addMessage(role, content) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.textContent = content;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = cleanString(input.value);
            
            if (!message) return;
            if (!apiKey) {
                addMessage('assistant', '⚠️ Please add your OpenRouter API key in settings first.');
                return;
            }
            
            addMessage('user', message);
            input.value = '';
            
            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`,
                        'HTTP-Referer': 'https://xcodevoid.github.io/Deep-Evolver',
                        'X-Title': 'Deep-Evolver'
                    },
                    body: JSON.stringify({
                        model: 'deepseek/deepseek-r1:free',
                        messages: [{ role: 'user', content: message }],
                        temperature: 0.7,
                        max_tokens: 1000
                    })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText.substring(0, 100)}`);
                }
                
                const data = await response.json();
                if (data.choices && data.choices[0]) {
                    addMessage('assistant', data.choices[0].message.content);
                } else {
                    addMessage('assistant', '⚠️ Unexpected response format');
                }
                
            } catch (error) {
                console.error('Error:', error);
                addMessage('assistant', `⚠️ Error: ${error.message}`);
            }
        }

        // Handle enter key
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        // Make sendMessage globally available
        window.sendMessage = sendMessage;
    </script>
</body>
</html>
